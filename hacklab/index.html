<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HACKLAB — Learn Ethical Hacking by Playing</title>
  <meta name="description" content="A mission-based game that teaches ethical hacking, network security and penetration testing through interactive, fully-simulated challenges." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-in">
      <div class="brand" style="cursor:pointer" onclick="Game.renderHome()">HACK<span>LAB</span></div>
      <div class="hud">
        <span class="pill" id="hud-rank">Script Kiddie</span>
        <span class="pill" id="hud-level">LVL 1</span>
        <span class="pill" id="hud-xp">0 XP</span>
        <span class="xpbar"><i id="hud-bar" style="width:0%"></i></span>
        <button class="reset" onclick="Game.reset()">Reset</button>
      </div>
    </div>
  </div>

  <main class="wrap">
    <div id="view"><!-- rendered by app.js --></div>
  </main>

  <footer class="wrap">
    HACKLAB · for education &amp; authorized testing only · all scenarios are simulated.
  </footer>

  <script src="js/curriculum.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
